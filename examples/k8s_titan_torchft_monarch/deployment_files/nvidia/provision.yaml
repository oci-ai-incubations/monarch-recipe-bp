# Controller manifest for Python-native MonarchMesh provisioning.
#
# The Python script creates MonarchMesh CRDs via the K8s API using --provision.
# No worker pod YAML manifests are needed.
#
# Prerequisites:
# - Kubernetes cluster with Monarch operator installed
# - GPU nodes with nvidia.com/gpu resources available
---
apiVersion: v1
kind: Namespace
metadata:
  name: monarch-tests
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monarch-controller
  namespace: monarch-tests
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monarch-controller
  namespace: monarch-tests
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monarch.pytorch.org"]
    resources: ["monarchmeshes"]
    verbs: ["create", "get", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monarch-controller
  namespace: monarch-tests
subjects:
  - kind: ServiceAccount
    name: monarch-controller
    namespace: monarch-tests
roleRef:
  kind: Role
  name: monarch-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: monarch-controller
  namespace: monarch-tests
spec:
  clusterIP: None
  selector:
    app: monarch-controller
  ports:
    - name: monarch
      port: 26600
      targetPort: 26600
    - name: lighthouse
      port: 41193
      targetPort: 41193
---
apiVersion: v1
kind: Pod
metadata:
  name: monarch-controller
  namespace: monarch-tests
  labels:
    app: monarch-controller
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - BM.GPU.H100.8
                  - BM.GPU.A100-v2.8
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  containers:
    - name: controller
      image: ghcr.io/dochakov-oci/monarch-oci:titan-torchft-nvidia-8b-01
      command: ["sleep"]
      args: ["infinity"]
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
  serviceAccountName: monarch-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monarch-client
  namespace: monarch-tests
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monarch-client-binding
  namespace: monarch-tests
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monarch-client-role
subjects:
  - kind: ServiceAccount
    name: monarch-client
    namespace: monarch-tests
