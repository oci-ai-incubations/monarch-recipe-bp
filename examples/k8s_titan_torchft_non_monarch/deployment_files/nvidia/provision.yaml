# Vanilla (non-Monarch) TorchTitan + TorchFT provisioning.
#
# Creates one Lighthouse pod + Service and two replica pods (one per
# data-parallel replica). All pods sleep — the user copies the Python scripts
# in via `kubectl cp` and starts them with `kubectl exec`.
#
# Prerequisites:
# - Kubernetes cluster with NVIDIA GPU nodes (BM.GPU.H100.8 or BM.GPU.A100-v2.8).
# - The image below must contain torchtitan (with experiments/ft) and torchft
#   — the same Monarch image used by the Monarch flow works.
#
# This manifest does NOT depend on the Monarch operator or the MonarchMesh CRD.
---
apiVersion: v1
kind: Namespace
metadata:
  name: monarch-tests
---
# Lighthouse Service: replicas reach the lighthouse via DNS at
# torchft-lighthouse.monarch-tests.svc.cluster.local:29510 — also injected as
# TORCHFT_LIGHTHOUSE on each replica pod below.
apiVersion: v1
kind: Service
metadata:
  name: torchft-lighthouse
  namespace: monarch-tests
spec:
  selector:
    app: torchft-lighthouse
  ports:
    - name: lighthouse
      port: 29510
      targetPort: 29510
---
# Lighthouse pod — runs `torchft.coordination.LighthouseServer`. No GPUs
# required, but we land it on a GPU node so the CUDA-based image starts cleanly
# (matches the existing monarch-controller pod placement).
apiVersion: v1
kind: Pod
metadata:
  name: torchft-lighthouse
  namespace: monarch-tests
  labels:
    app: torchft-lighthouse
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - BM.GPU.H100.8
                  - BM.GPU.A100-v2.8
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  containers:
    - name: lighthouse
      image: ghcr.io/dochakov-oci/monarch-oci:titan-torchft-nvidia-8b-rdma-01
      command: ["sleep"]
      args: ["infinity"]
      ports:
        - containerPort: 29510
          name: lighthouse
---
# Replica 0 — torchrun on 8 GPUs, replicates with replica 1 via the lighthouse.
apiVersion: v1
kind: Pod
metadata:
  name: vanilla-replica-0
  namespace: monarch-tests
  labels:
    app: vanilla-titan-torchft
    replica-id: "0"
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - BM.GPU.H100.8
                  - BM.GPU.A100-v2.8
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: vanilla-titan-torchft
          topologyKey: kubernetes.io/hostname
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  containers:
    - name: trainer
      image: ghcr.io/dochakov-oci/monarch-oci:titan-torchft-nvidia-8b-rdma-01
      command: ["sleep"]
      args: ["infinity"]
      # RDMA: IPC_LOCK + privileged are required to pin memory for RDMA. The
      # ``nvidia.com/sriov-rdma-vf`` resource request triggers the
      # monarch-sriov-vf-injector webhook (Multus annotation
      # ``k8s.v1.cni.cncf.io/networks=sriov-rdma-vf``) so a Mellanox VF netdev
      # is plumbed into the pod netns for NCCL. One VF per physical RDMA port
      # on the node (16 CX-6 data-plane ports per a100-sriov-policy.yaml),
      # which means each replica pod consumes the node's full VF pool —
      # consistent with podAntiAffinity (one replica per node).
      securityContext:
        privileged: true
        capabilities:
          add: ["IPC_LOCK"]
      env:
        - name: REPLICA_ID
          value: "0"
        # POD_IP is required as torchrun --master_addr below. It must be a
        # pod-routable address so (1) the c10d TCPStore that torchrun spins up
        # binds on an externally reachable interface, and (2) the value torchft
        # advertises to the Lighthouse as store_address can be reached by the
        # *other* replica during cross-replica state recovery.
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TORCHFT_LIGHTHOUSE
          value: "http://torchft-lighthouse.monarch-tests.svc.cluster.local:29510"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "ALL"
        - name: NCCL_PROTO
          value: "Simple"
        - name: TORCH_SHARE_RDZV_TCP_STORE
          value: "1"
        - name: TORCH_CPP_LOG_LEVEL
          value: "INFO"
        - name: LOGLEVEL
          value: "INFO"
        - name: TORCHFT_QUORUM_TIMEOUT_SEC
          value: "900"
        - name: TORCHFT_TIMEOUT_SEC
          value: "600"
        - name: TORCHFT_QUORUM_RETRIES
          value: "0"
        - name: NCCL_IB_DISABLE
          value: "0"
        - name: NCCL_IB_HCA
          value: "mlx5"
        - name: NCCL_IB_GID_INDEX
          value: "3"
        - name: NCCL_IB_TC
          value: "41"
        - name: NCCL_IB_SL
          value: "0"
        - name: NCCL_IB_QPS_PER_CONNECTION
          value: "4"
        - name: NCCL_NET_GDR_LEVEL
          value: "PHB"
      resources:
        limits:
          nvidia.com/gpu: "8"
          nvidia.com/sriov-rdma-vf: "16"
        requests:
          nvidia.com/gpu: "8"
          nvidia.com/sriov-rdma-vf: "16"
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: infiniband
          mountPath: /dev/infiniband
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: infiniband
      hostPath:
        path: /dev/infiniband
---
# Replica 1 — identical to replica 0 except for REPLICA_ID. Pod anti-affinity
# guarantees it lands on a different node so each replica gets a full BM's
# worth of GPUs.
apiVersion: v1
kind: Pod
metadata:
  name: vanilla-replica-1
  namespace: monarch-tests
  labels:
    app: vanilla-titan-torchft
    replica-id: "1"
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - BM.GPU.H100.8
                  - BM.GPU.A100-v2.8
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: vanilla-titan-torchft
          topologyKey: kubernetes.io/hostname
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  containers:
    - name: trainer
      image: ghcr.io/dochakov-oci/monarch-oci:titan-torchft-nvidia-8b-rdma-01
      command: ["sleep"]
      args: ["infinity"]
      # See replica-0 securityContext comment above for RDMA rationale.
      securityContext:
        privileged: true
        capabilities:
          add: ["IPC_LOCK"]
      env:
        - name: REPLICA_ID
          value: "1"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: TORCHFT_LIGHTHOUSE
          value: "http://torchft-lighthouse.monarch-tests.svc.cluster.local:29510"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_DEBUG_SUBSYS
          value: "ALL"
        - name: NCCL_PROTO
          value: "Simple"
        - name: TORCH_SHARE_RDZV_TCP_STORE
          value: "1"
        - name: TORCH_CPP_LOG_LEVEL
          value: "INFO"
        - name: LOGLEVEL
          value: "INFO"
        - name: TORCHFT_QUORUM_TIMEOUT_SEC
          value: "900"
        - name: TORCHFT_TIMEOUT_SEC
          value: "600"
        - name: TORCHFT_QUORUM_RETRIES
          value: "0"
        - name: NCCL_IB_DISABLE
          value: "0"
        - name: NCCL_IB_HCA
          value: "mlx5"
        - name: NCCL_IB_GID_INDEX
          value: "3"
        - name: NCCL_IB_TC
          value: "41"
        - name: NCCL_IB_SL
          value: "0"
        - name: NCCL_IB_QPS_PER_CONNECTION
          value: "4"
        - name: NCCL_NET_GDR_LEVEL
          value: "PHB"
      resources:
        limits:
          nvidia.com/gpu: "8"
          nvidia.com/sriov-rdma-vf: "16"
        requests:
          nvidia.com/gpu: "8"
          nvidia.com/sriov-rdma-vf: "16"
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: infiniband
          mountPath: /dev/infiniband
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
    - name: infiniband
      hostPath:
        path: /dev/infiniband
